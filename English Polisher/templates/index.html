<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>English Polisher</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      textarea { width: 100%; height: 160px; }
      pre { background: #f6f8fa; padding: 1rem; }
      .correction { margin-bottom: .5rem; }
    </style>
  </head>
  <body>
    <h1>English Polisher</h1>
    <p>Paste your English text and get a corrected, more natural version with explanations in Spanish.</p>
    <form id="form">
      <textarea id="text" name="text" placeholder="Type or paste English text here..."></textarea>
      <br>
      <button type="submit">Polish</button>
    </form>

    <h2>Result</h2>
    <div id="result">
      <h3>Improved text</h3>
      <pre id="improved"></pre>
      <h3>Corrections</h3>
      <div id="corrections"></div>
    </div>

    <script>
      const form = document.getElementById('form')
      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        const text = document.getElementById('text').value
        const res = await fetch('/api/polish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        })
        const data = await res.json()
        document.getElementById('improved').textContent = data.improved || ''
        const container = document.getElementById('corrections')
        container.innerHTML = ''
        (data.corrections || []).forEach(c => {
          const d = document.createElement('div')
          d.className = 'correction'
          d.innerHTML = `<strong>Orig:</strong> ${c.orig} <br><strong>Suggestion:</strong> ${c.suggestion} <br><strong>Explicación (ES):</strong> ${c.explanation_es}`
          container.appendChild(d)
        })
      })
    </script>
  </body>
</html>
